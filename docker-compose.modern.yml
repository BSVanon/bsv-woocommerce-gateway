services:
  mysql-modern:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db_data_modern:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      default:
        ipv4_address: 172.19.0.2

  wordpress-modern:
    image: wordpress:6.7-php8.2-apache
    depends_on:
      - mysql-modern
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: mysql-modern:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - ./docker/wp-modern:/var/www/html
      - ./:/var/www/html/wp-content/plugins/bitcoin-sv-payments-for-woocommerce
    networks:
      default:
        ipv4_address: 172.19.0.3

networks:
  default:
    external: true
    name: bsv-woocommerce_default

volumes:
  db_data_modern:
